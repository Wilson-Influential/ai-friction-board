<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Off Your Chest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#201747; --white:#fff; --charcoal:#5f616d; --red:#fe2458;
    --warm:#ff7d3a; --blue:#5c68eb;
    --font:'Mulish','Segoe UI',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);-webkit-font-smoothing:antialiased;color:#fff;min-height:100vh;
    background:
      radial-gradient(130% 80% at 80% -10%, #4a2150 0%, transparent 55%),
      radial-gradient(120% 90% at -10% 110%, #2a1c5c 0%, transparent 50%),
      #1b1338;}
  .wrap{max-width:760px;margin:0 auto;padding:0 22px}
  a{color:inherit}

  .top{display:flex;align-items:center;justify-content:space-between;padding:20px 0}
  .top img{height:22px}
  .back{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#c9bdec;text-decoration:none;
    border:1px solid rgba(255,255,255,.16);padding:8px 14px;border-radius:100px;transition:.2s}
  .back:hover{border-color:#fff;color:#fff}

  header.hd{padding:30px 0 8px;text-align:center}
  .kicker{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--warm);font-weight:800;margin-bottom:14px}
  header.hd h1{font-size:clamp(36px,7vw,62px);font-weight:900;letter-spacing:-.03em;line-height:.96}
  header.hd p{margin:16px auto 0;font-size:16px;font-weight:300;color:#d6cdf0;max-width:440px;line-height:1.55}

  /* composer card */
  .vent{margin:26px 0 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    border-radius:24px;padding:22px;backdrop-filter:blur(8px)}
  .moods{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .moods .m{font-size:20px;width:42px;height:42px;border-radius:12px;border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.04);cursor:pointer;transition:.2s;display:grid;place-items:center}
  .moods .m:hover{transform:translateY(-2px)}
  .moods .m.on{border-color:var(--warm);background:rgba(255,125,58,.18);transform:scale(1.05)}
  textarea#rant{width:100%;min-height:120px;background:transparent;border:0;outline:none;color:#fff;
    font-family:inherit;font-size:19px;font-weight:300;line-height:1.5;resize:none}
  textarea#rant::placeholder{color:#9286bd}
  .ventfoot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;flex-wrap:wrap}
  .ventfoot .who{flex:1;min-width:140px}
  .ventfoot input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:100px;
    color:#fff;font-family:inherit;font-size:13px;padding:10px 15px;outline:none;width:100%}
  .ventfoot input::placeholder{color:#9286bd}
  .send{border:0;background:var(--warm);color:#231a0a;font-family:inherit;font-weight:900;font-size:15px;
    padding:13px 26px;border-radius:100px;cursor:pointer;transition:.2s;white-space:nowrap}
  .send:hover{filter:brightness(1.06);transform:translateY(-1px)}
  .send:disabled{opacity:.5;cursor:default;transform:none}

  /* the "thinking" reveal */
  .thinking{display:none;align-items:center;gap:12px;margin:18px 0 2px;padding:16px 18px;border-radius:16px;
    background:rgba(92,104,235,.12);border:1px solid rgba(92,104,235,.3)}
  .thinking.show{display:flex}
  .orbit{width:26px;height:26px;border-radius:50%;border:4px solid rgba(255,255,255,.18);border-top-color:var(--warm);
    animation:spin .8s linear infinite;flex:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .thinking p{font-size:14px;color:#cdc4ee;font-weight:300}
  .thinking b{color:#fff;font-weight:700}

  /* feed */
  .feedhead{display:flex;align-items:baseline;justify-content:space-between;margin:34px 0 14px}
  .feedhead h2{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#b3a6dd;font-weight:800}
  .feedhead a{font-size:13px;color:#9286bd;text-decoration:none;font-weight:700}
  .feedhead a:hover{color:#fff}
  .feed{display:flex;flex-direction:column;gap:14px;padding-bottom:70px}

  .ncard{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.11);border-radius:20px;padding:20px 20px 18px;
    position:relative;overflow:hidden}
  .ncard.fresh{animation:pop .55s cubic-bezier(.2,.8,.2,1)}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
  .ncard .raw{font-size:15px;font-weight:300;font-style:italic;color:#d8d0ef;line-height:1.5;
    border-left:2px solid rgba(255,255,255,.18);padding-left:14px;margin-bottom:16px}
  .ncard .raw .mood{font-style:normal;margin-right:6px}
  .nch{display:flex;align-items:flex-start;gap:12px;justify-content:space-between}
  .ncard h3{font-size:19px;font-weight:800;letter-spacing:-.01em;line-height:1.25;flex:1}
  .tag{font-size:11px;font-weight:800;padding:4px 9px;border-radius:6px;color:#fff;white-space:nowrap}
  .fix{margin-top:14px;background:rgba(255,125,58,.1);border:1px solid rgba(255,125,58,.28);border-radius:13px;padding:13px 14px}
  .fix .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--warm);font-weight:800}
  .fix p{font-size:14px;color:#f1e9da;line-height:1.5;margin-top:6px;font-weight:400}
  .ncfoot{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
  .by{font-size:12px;color:#9286bd;font-weight:700}
  .vote{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
    border-radius:100px;padding:8px 15px;cursor:pointer;transition:.2s;color:#fff;font-family:inherit}
  .vote:hover{border-color:var(--red)}
  .vote.voted{background:rgba(254,36,88,.18);border-color:var(--red)}
  .vote .up{color:var(--red);font-size:13px}
  .vote .n{font-weight:900;font-size:16px}
  .vote .lbl{font-size:12px;color:#c9bdec;font-weight:700}
  .bump{animation:bmp .35s ease}
  @keyframes bmp{40%{transform:scale(1.3)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <img src="assets/inf-white.png" alt="Influential">
    <a class="back" href="index.html">← all three takes</a>
  </div>

  <header class="hd">
    <div class="kicker">Off Your Chest</div>
    <h1>Get it off<br>your chest.</h1>
    <p>Type the thing that grinds your gears at work. No tidy form, just say it. It quietly turns into a card the team can vote on, with a suggested AI fix.</p>
  </header>

  <div class="vent">
    <div class="moods" id="moods">
      <div class="m" data-mood="😤" title="Frustrating">😤</div>
      <div class="m" data-mood="😩" title="Draining">😩</div>
      <div class="m" data-mood="🔁" title="Repetitive">🔁</div>
      <div class="m" data-mood="🐌" title="Slow">🐌</div>
      <div class="m" data-mood="🙃" title="Silly">🙃</div>
    </div>
    <textarea id="rant" placeholder="Honestly? Every time we onboard a client I'm copy-pasting the same thirty forms and rewriting the same email…"></textarea>
    <div class="ventfoot">
      <div class="who"><input id="who" placeholder="Name (optional, can stay anonymous)"></div>
      <button class="send" id="send">Let it out →</button>
    </div>
  </div>

  <div class="thinking" id="thinking">
    <div class="orbit"></div>
    <p id="thinkmsg"><b>Reading your rant…</b></p>
  </div>

  <div class="feedhead">
    <h2>On the board</h2>
    <a href="log.html">see it as a ranked list →</a>
  </div>
  <div class="feed" id="feed"></div>
</div>

<script src="assets/data.js"></script>
<script>
  let items = FRICTION.load();
  let mood = '';
  const votedKey='friction_voted_v1';
  let voted = new Set(JSON.parse(localStorage.getItem(votedKey)||'[]'));

  // mood select
  document.getElementById('moods').addEventListener('click',e=>{
    const m=e.target.closest('.m'); if(!m)return;
    if(mood===m.dataset.mood){mood='';m.classList.remove('on');}
    else{mood=m.dataset.mood;document.querySelectorAll('.m').forEach(x=>x.classList.toggle('on',x===m));}
  });

  // lightweight, honest "tidy": pull a title, guess a category, suggest a fix.
  const RULES = [
    {k:['onboard','sign up','new client','forms','intake'],cat:'Onboarding',fix:'One onboarding flow that fills the forms and drafts the emails from a single set of answers.'},
    {k:['spreadsheet','time','hours','log','allocat','timesheet'],cat:'PR workflow',fix:'A simple time view that totals and checks itself, so logging takes seconds not minutes.'},
    {k:['deck','powerpoint','slide','design','logo','brand','format','template'],cat:'Design',fix:'Brand-safe edits anyone can make in the studio, designers freed for the real creative.'},
    {k:['again','same','retype','repeat','every time','copy','paste','manual'],cat:'Repetition',fix:'Automate the repeat: do it once, let the tool replay it from your inputs.'},
    {k:['report','numbers','dashboard','stats','metrics','monthly'],cat:'Reporting',fix:'A report that fills its own template from the month\'s data.'},
    {k:['approv','sign-off','sign off','chase','version','final','email','inbox'],cat:'Admin',fix:'One live link per piece that shows the current version and who is left to approve.'}
  ];
  function tidy(text){
    const low=text.toLowerCase();
    let best={cat:'Other',fix:'Worth scoping at the monthly forum. Even a small automation might cover it.',hits:0};
    for(const r of RULES){const hits=r.k.filter(w=>low.includes(w)).length; if(hits>best.hits) best={cat:r.cat,fix:r.fix,hits};}
    // title = first sentence, trimmed, capitalised, max ~64 chars
    let t=text.split(/[.!?\n]/)[0].trim();
    if(t.length>64) t=t.slice(0,61).trim()+'…';
    t=t.charAt(0).toUpperCase()+t.slice(1);
    // guess minutes from words
    let mins=45; if(/hour|hours/.test(low))mins=120; if(/all day|forever|ages/.test(low))mins=180; if(/every time|every client/.test(low))mins=150;
    return {title:t,category:best.cat,aiIdea:best.fix,minsPerWeek:mins};
  }

  const feed=document.getElementById('feed');
  const fmtMood = m => m ? `<span class="mood">${m}</span>` : '';
  function render(){
    // newest first, then by votes
    const arr=[...items].sort((a,b)=>{
      const an=a.id.startsWith('u')?1:0, bn=b.id.startsWith('u')?1:0;
      if(an!==bn) return bn-an; return b.votes-a.votes;
    });
    feed.innerHTML='';
    arr.forEach(it=>feed.appendChild(card(it,false)));
  }
  function card(it,fresh){
    const cat=FRICTION.CATEGORIES[it.category]||FRICTION.CATEGORIES.Other;
    const el=document.createElement('div'); el.className='ncard'+(fresh?' fresh':'');
    el.innerHTML=`
      ${it.raw?`<div class="raw">${fmtMood(it.mood)}${esc(it.raw)}</div>`:''}
      <div class="nch"><h3>${esc(it.title)}</h3><span class="tag" style="background:${cat.color}">${it.category}</span></div>
      <div class="fix"><div class="k">◷ Suggested AI fix</div><p>${esc(it.aiIdea||'To be scoped.')}</p></div>
      <div class="ncfoot">
        <span class="by">${esc(it.who||'Anonymous')}</span>
        <button class="vote ${voted.has(it.id)?'voted':''}" data-vote="${it.id}">
          <span class="up">▲</span><span class="n" id="vn_${it.id}">${it.votes}</span><span class="lbl">same here</span>
        </button>
      </div>`;
    el.querySelector('[data-vote]').addEventListener('click',()=>vote(it.id));
    return el;
  }
  function vote(id){
    const it=items.find(x=>x.id===id); if(!it)return;
    if(voted.has(id)){it.votes--;voted.delete(id);} else {it.votes++;voted.add(id);}
    FRICTION.save(items); localStorage.setItem(votedKey,JSON.stringify([...voted]));
    const n=document.getElementById('vn_'+id);
    if(n){n.textContent=it.votes;n.classList.remove('bump');void n.offsetWidth;n.classList.add('bump');}
    document.querySelector(`[data-vote="${id}"]`).classList.toggle('voted',voted.has(id));
  }

  // submit with a short "thinking" beat (animate understanding, honestly)
  const thinking=document.getElementById('thinking'), tmsg=document.getElementById('thinkmsg'), sendBtn=document.getElementById('send');
  sendBtn.onclick=()=>{
    const raw=document.getElementById('rant').value.trim();
    if(!raw){document.getElementById('rant').focus();return;}
    sendBtn.disabled=true; thinking.classList.add('show');
    const steps=['<b>Reading your rant…</b>','Spotting the pattern…','Tagging where it fits…','Suggesting a fix…'];
    let i=0; tmsg.innerHTML=steps[0];
    const iv=setInterval(()=>{i++; if(i<steps.length) tmsg.innerHTML=steps[i];},420);
    setTimeout(()=>{
      clearInterval(iv); thinking.classList.remove('show'); sendBtn.disabled=false;
      const t=tidy(raw);
      const it={id:FRICTION.newId(),title:t.title,detail:raw,raw:raw,mood:mood,category:t.category,
        who:document.getElementById('who').value.trim()||'Anonymous',minsPerWeek:t.minsPerWeek,
        frequency:'From a vent',votes:1,status:'Raised',aiIdea:t.aiIdea};
      items.push(it); voted.add(it.id); localStorage.setItem(votedKey,JSON.stringify([...voted]));
      FRICTION.save(items);
      document.getElementById('rant').value=''; document.getElementById('who').value='';
      mood=''; document.querySelectorAll('.m').forEach(x=>x.classList.remove('on'));
      feed.insertBefore(card(it,true), feed.firstChild);
    }, 1850);
  };

  function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  render();
</script>
</body>
</html>
